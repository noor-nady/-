<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KASHEER | الكاشير</title>
  <meta name="description" content="شاشة الكاشير - مسح المنتجات وإتمام عملية الدفع"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="cashier-page">

  <!-- Header -->
  <header class="cashier-header">
    <div class="cashier-header-logo">
      <div class="logo-icon-sm">
        <svg width="26" height="26" viewBox="0 0 36 36" fill="none">
          <rect x="2" y="2" width="32" height="32" rx="10" fill="url(#cgrad)"/>
          <path d="M10 14h16M10 18h10M10 22h12" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <rect x="20" y="19" width="8" height="8" rx="2" fill="white" opacity="0.9"/>
          <defs><linearGradient id="cgrad" x1="2" y1="2" x2="34" y2="34" gradientUnits="userSpaceOnUse"><stop stop-color="#6C63FF"/><stop offset="1" stop-color="#3ECFCF"/></linearGradient></defs>
        </svg>
      </div>
      <span>KASHEER</span>
    </div>
    <div class="cashier-info">
      <div class="cashier-avatar" id="cashierAvatar">C</div>
      <div class="cashier-meta">
        <span class="cashier-name" id="cashierName">البائع</span>
        <span class="cashier-time" id="cashierTime"></span>
      </div>
    </div>
    <button class="btn-logout cashier-logout" id="logoutBtnCashier" title="تسجيل الخروج">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </header>

  <!-- Main Layout -->
  <div class="cashier-layout">

    <!-- Left: Scanner + Cart -->
    <div class="cashier-left">

      <!-- Scanner Area -->
      <div class="scan-area">
        <div class="scan-input-row">
          <input type="text" id="barcodeInput" class="barcode-field" placeholder="امسح الباركود أو اكتبه هنا..." autofocus autocomplete="off"/>
          <button class="btn-cam-scan" id="openCamScan" title="مسح بالكاميرا">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </button>
        </div>
        <!-- Camera Scanner -->
        <div class="cam-scanner-wrap hidden" id="camScannerWrap">
          <div id="cashierScannerContainer" class="scanner-container"></div>
          <button class="btn-secondary btn-stop-scan" id="stopCamScan">ايقاف الكاميرا</button>
        </div>
      </div>

      <!-- Product Found Card -->
      <div class="product-found-card hidden" id="productFoundCard">
        <div class="product-found-inner">
          <div class="product-found-info">
            <span class="product-found-name" id="foundProductName">-</span>
            <span class="product-found-barcode" id="foundProductBarcode">-</span>
          </div>
          <div class="product-found-price" id="foundProductPrice">0.00 ج.م</div>
        </div>
        <div class="product-qty-row">
          <label>الكمية:</label>
          <div class="qty-control">
            <button class="qty-btn" id="decreaseQty">-</button>
            <input type="number" id="itemQty" value="1" min="1" max="999"/>
            <button class="qty-btn" id="increaseQty">+</button>
          </div>
          <button class="btn-add-cart" id="addToCartBtn">اضافة للفاتورة</button>
        </div>
        <div class="not-found-msg hidden" id="notFoundMsg">المنتج غير موجود في النظام</div>
      </div>

      <!-- Cart Items -->
      <div class="cart-section">
        <div class="cart-header">
          <h3>الفاتورة الحالية</h3>
          <button class="btn-clear-cart" id="clearCartBtn">مسح الكل</button>
        </div>
        <div class="cart-items" id="cartItems">
          <div class="cart-empty" id="cartEmpty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            <p>لا يوجد منتجات في الفاتورة</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Payment Panel -->
    <div class="cashier-right">
      <div class="payment-panel">
        <div class="payment-summary">
          <div class="summary-row">
            <span>عدد الأصناف</span>
            <span id="totalItems">0</span>
          </div>
          <div class="summary-row">
            <span>الإجمالي قبل الخصم</span>
            <span id="subTotal">0.00 ج.م</span>
          </div>
          <div class="summary-row discount-row">
            <span>خصم (%)</span>
            <input type="number" id="discountInput" value="0" min="0" max="100" class="discount-input"/>
          </div>
          <div class="summary-row discount-amount-row">
            <span>قيمة الخصم</span>
            <span id="discountAmount">0.00 ج.م</span>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-row total-row">
            <span>الإجمالي النهائي</span>
            <span class="total-amount" id="grandTotal">0.00 ج.م</span>
          </div>
        </div>

        <div class="payment-methods">
          <div class="pm-label">طريقة الدفع</div>
          <div class="pm-options">
            <label class="pm-option active" id="pmCash">
              <input type="radio" name="payMethod" value="cash" checked/>
              <span>نقدي</span>
            </label>
            <label class="pm-option" id="pmCard">
              <input type="radio" name="payMethod" value="card"/>
              <span>بطاقة</span>
            </label>
          </div>
        </div>

        <div class="cash-received-wrap" id="cashReceivedWrap">
          <label>المبلغ المستلم (ج.م)</label>
          <input type="number" id="cashReceived" placeholder="0.00" step="0.01" min="0" class="cash-input"/>
          <div class="change-row">
            <span>الباقي:</span>
            <span class="change-amount" id="changeAmount">0.00 ج.م</span>
          </div>
        </div>

        <div class="payment-actions">
          <button class="btn-pay" id="payBtn">اتمام الدفع</button>
          <button class="btn-cancel-sale" id="cancelSaleBtn">الغاء الفاتورة</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: Payment Success ===== -->
  <div class="modal-overlay hidden" id="successModal">
    <div class="modal modal-success">
      <div class="success-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <h3>تمت عملية الدفع!</h3>
      <div class="receipt-preview" id="receiptPreview"></div>
      <div class="modal-actions">
        <button class="btn-primary" id="printReceipt">طباعة الفاتورة</button>
        <button class="btn-secondary" id="newSaleBtn">فاتورة جديدة</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toastCashier"></div>

  <!-- Print area -->
  <div id="printArea" class="print-area hidden"></div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="app.js"></script>
  <script src="scanner.js"></script>
  <script src="cashier.js"></script>
</body>
</html>
